name: Front-Deploy

on:
  push:
    branches: [main] # ajuste se usar outra

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3. Instalar e buildar
      - run: |
          npm i --frozen-lockfile --force
          npm run build

      - name: Garantir permissões
        run: chmod -R 755 out/

      # 4. Enviar apenas out/ (Next.js Static Export)
      - name: Deploy to VPS
        uses: burnett01/rsync-deployments@master
        with:
          switches: -avzr --delete
          path: out/
          remote_path: ${{ secrets.VPS_DEST }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_KEY }}
